name: Publish APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Auto bump version (tag-driven)
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          VERSION_NAME=${TAG_NAME#v}
          CURRENT_CODE=$(grep -n "versionCode" -m1 app/build.gradle.kts | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          NEXT_CODE=$((CURRENT_CODE + 1))
          sed -i -E "s/versionCode\\s*=\\s*[0-9]+/versionCode = ${NEXT_CODE}/" app/build.gradle.kts
          sed -i -E "s/versionName\\s*=\\s*\\\"[^\\\"]+\\\"/versionName = \\\"${VERSION_NAME}\\\"/" app/build.gradle.kts

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/demirtv_keystore.jks

      - name: Build APK (release, signed)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/demirtv_keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare APK
        id: prep
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          APK_NAME="DemirTV-${TAG_NAME}.apk"
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk "out/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Detect force update from tag message
        id: force
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          TAG_MSG=$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(contents)')
          FORCE=false
          if echo "$TAG_MSG" | grep -qi "force"; then
            FORCE=true
          fi
          echo "force_update=${FORCE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ steps.prep.outputs.apk_name }}
          name: "DemirTV ${{ github.ref_name }}"
          generate_release_notes: true

      - name: Update update.json
        run: |
          VERSION_CODE=$(grep -n "versionCode" -m1 app/build.gradle.kts | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          VERSION_NAME=$(grep -n "versionName" -m1 app/build.gradle.kts | sed -E 's/.*versionName\s*=\s*\"([^\"]+)\".*/\1/')
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ steps.prep.outputs.apk_name }}"
          cat > update.json << EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "downloadUrl": "${DOWNLOAD_URL}",
            "forceUpdate": ${{ steps.force.outputs.force_update }}
          }
          EOF

      - name: Commit update.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json app/build.gradle.kts
          git commit -m "Update version and update.json for ${GITHUB_REF_NAME}" || echo "No changes"
          git push origin HEAD:main
